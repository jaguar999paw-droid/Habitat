# render.yaml — Render.com free hosting configuration for Habitat
# Deploy at: https://dashboard.render.com/new/blueprint
# Point it at this repo — Render reads this file automatically.

services:
  # ── Backend API (Express) ─────────────────────────────────────────────────
  - type: web
    name: habitat-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: web
    name: habitat-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://habitat-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
