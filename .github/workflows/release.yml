name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Bundle release archive
        run: |
          mkdir -p release/habitat-${{ github.ref_name }}
          cp -r backend engine ai ml-service release/habitat-${{ github.ref_name }}/
          [ -d docs ] && cp -r docs release/habitat-${{ github.ref_name }}/ || true
          cp -r frontend/dist release/habitat-${{ github.ref_name }}/frontend-dist
          cp -r scripts release/habitat-${{ github.ref_name }}/ 2>/dev/null || true
          cp package.json .env.example README.md LICENSE START.sh START.ps1 release/habitat-${{ github.ref_name }}/
          chmod +x release/habitat-${{ github.ref_name }}/START.sh
          chmod +x release/habitat-${{ github.ref_name }}/scripts/INSTALL.sh 2>/dev/null || true
          cd release
          tar -czf habitat-${{ github.ref_name }}.tar.gz habitat-${{ github.ref_name }}
          zip -r habitat-${{ github.ref_name }}.zip habitat-${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Habitat ${{ github.ref_name }}
          body: |
            ## Habitat — AI Songwriting Engine ${{ github.ref_name }}

            Cross-platform source release (Node.js + Python). Works on **Linux**, **macOS**, and **Windows** (PowerShell or Git Bash).

            ### What's included
            - Cockpit UI, Hook Book, Studio modes, identity pipeline (15 engine modules)
            - Python ML microservice + graceful fallback without ML
            - Claude + OpenAI · section-by-section generation · session save/load
            - `START.sh` (Unix) · `START.ps1` (Windows) · `scripts/INSTALL.sh`

            ### Quick start

            | OS | Install | Run |
            |---|---|---|
            | Linux / macOS | `tar -xzf habitat-*.tar.gz && cd habitat-* && ./scripts/INSTALL.sh` | `./START.sh` |
            | Windows (PowerShell) | Expand `habitat-*.zip` | `.\START.ps1` |
            | Windows (Git Bash) | same as Linux | `./START.sh` |

            **Requires:** Node.js 18+, Python 3.10+, Anthropic or OpenAI API key.

            ```bash
            tar -xzf habitat-${{ github.ref_name }}.tar.gz
            cd habitat-${{ github.ref_name }}
            ./scripts/INSTALL.sh
            ./START.sh
            ```

            Open **http://localhost:3000** after startup.

            See README.md for full documentation.
          files: |
            release/habitat-${{ github.ref_name }}.tar.gz
            release/habitat-${{ github.ref_name }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
